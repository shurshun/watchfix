document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ов<\u002Fdiv><div style=\"font-size:17px;line-height:1.55;color:#5c5f68\">Разборка, чистка, смазка, отладка хода. Мелкий ремонт: головки, ушки, шпильки. Гарантия 1 год.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f7f7f5;border:1px solid #e3e3e0;border-radius:6px;padding:26px;border-top:3px solid #e8402c\"><div style=\"font-weight:800;font-size:19px;margin-bottom:8px\">Замена батареек<\u002Fdiv><div style=\"font-size:17px;line-height:1.55;color:#5c5f68\">Швейцарские Renata с гарантией 12 месяцев. Аккуратно, без повреждения уплотнителей.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f7f7f5;border:1px solid #e3e3e0;border-radius:6px;padding:26px;border-top:3px solid #e8402c\"><div style=\"font-weight:800;font-size:19px;margin-bottom:8px\">Замена стёкол<\u002Fdiv><div style=\"font-size:17px;line-height:1.55;color:#5c5f68\">Изготовим стекло под вашу модель при трещинах, сколах, помутнении.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f7f7f5;border:1px solid #e3e3e0;border-radius:6px;padding:26px;border-top:3px solid #e8402c\"><div style=\"font-weight:800;font-size:19px;margin-bottom:8px\">Замена механизмов<\u002Fdiv><div style=\"font-size:17px;line-height:1.55;color:#5c5f68\">Со склада или под заказ до 30 дней — тот же производитель.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f7f7f5;border:1px solid #e3e3e0;border-radius:6px;padding:26px;border-top:3px solid #e8402c\"><div style=\"font-weight:800;font-size:19px;margin-bottom:8px\">Ремешки и браслеты<\u002Fdiv><div style=\"font-size:17px;line-height:1.55;color:#5c5f68\">Кожа Stailer (Германия), любые цвета и фактуры. Укорочение браслетов.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f7f7f5;border:1px solid #e3e3e0;border-radius:6px;padding:26px;border-top:3px solid #e8402c\"><div style=\"font-weight:800;font-size:19px;margin-bottom:8px\">Обмен часов<\u002Fdiv><div style=\"font-size:17px;line-height:1.55;color:#5c5f68\">Неисправные часы — в зачёт стоимости рабочих. Гарантия 6–12 месяцев.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== Гравировка ===== -->\n<div id=\"etching\" data-screen-label=\"Гравировка\" style=\"padding:clamp(40px,6vw,64px) clamp(16px,4vw,48px);display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:32px 48px;align-items:center;scroll-margin-top:90px\">\n  <div>\n    <div style=\"font-size:clamp(14px,2vw,16px);letter-spacing:.22em;text-transform:uppercase;color:#e8402c;font-weight:800;margin-bottom:14px\">Гравировка<\u002Fdiv>\n    <h2 style=\"font-size:clamp(28px,4vw,34px);font-weight:800;margin:0 0 16px;line-height:1.15\">Надписи, которые остаются<\u002Fh2>\n    <p style=\"font-size:17px;line-height:1.6;color:#5c5f68;margin:0\">Металл, стекло, дерево, камень, пластик, керамика. Латунные пластинки нужного размера — жёлтые или хромированные. На камне и пластике — заполнение краской «под золото».<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-content:center\">\n    <span style=\"padding:10px 18px;border:1px solid #c6c8cc;border-radius:999px;font-size:17px;background:#fff\">Часы<\u002Fspan>\n    <span style=\"padding:10px 18px;border:1px solid #c6c8cc;border-radius:999px;font-size:17px;background:#fff\">Бокалы<\u002Fspan>\n    <span style=\"padding:10px 18px;border:1px solid #c6c8cc;border-radius:999px;font-size:17px;background:#fff\">Ножи<\u002Fspan>\n    <span style=\"padding:10px 18px;border:1px solid #c6c8cc;border-radius:999px;font-size:17px;background:#fff\">Шкатулки<\u002Fspan>\n    <span style=\"padding:10px 18px;border:1px solid #c6c8cc;border-radius:999px;font-size:17px;background:#fff\">Фляги<\u002Fspan>\n    <span style=\"padding:10px 18px;border:1px solid #e8402c;border-radius:999px;font-size:17px;color:#e8402c;font-weight:700;background:#fff\">Латунные пластинки<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== О мастере ===== -->\n<div id=\"master\" data-screen-label=\"О мастере\" style=\"padding:clamp(40px,6vw,64px) clamp(16px,4vw,48px);background:#33363f;color:#fff;scroll-margin-top:90px\">\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:36px 56px;align-items:center;max-width:1100px;margin:0 auto\">\n    <div style=\"display:flex;justify-content:center\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"58706e74-d36c-4920-99fe-3ca1adb5a945#/image-slot.js\" id=\"master-photo\" shape=\"circle\" placeholder=\"Фото мастера\" src=\"https://watch-fix.ru/assets/img/men1.jpg\" style=\"width:min(280px,70vw);height:min(280px,70vw)\" hint-size=\"280px,280px\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:clamp(14px,2vw,16px);letter-spacing:.22em;text-transform:uppercase;color:#e8402c;font-weight:800;margin-bottom:14px\">О мастере<\u002Fdiv>\n      <h2 style=\"font-size:clamp(28px,4vw,34px);font-weight:800;margin:0 0 16px;line-height:1.15\">Более 40 лет за часовым верстаком<\u002Fh2>\n      <p style=\"font-size:18px;line-height:1.6;color:#d4d5da;margin:0 0 12px\">Я прекрасно понимаю, насколько важны часы для их владельцев. Доверьте ремонт профессионалу — работа будет сделана быстро и качественно.<\u002Fp>\n      <p style=\"font-size:18px;line-height:1.6;color:#d4d5da;margin:0\">На все работы даётся гарантия: 1 год на ремонт, 12 месяцев на батарейки.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== Вопросы ===== -->\n<div id=\"faq\" data-screen-label=\"Вопросы\" style=\"padding:clamp(40px,6vw,64px) clamp(16px,4vw,48px);background:#fff;scroll-margin-top:90px\">\n  <h2 style=\"font-size:clamp(28px,4vw,34px);font-weight:800;margin:0 0 32px\">Частые вопросы<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px\">\n    <div style=\"background:#f7f7f5;border:1px solid #e3e3e0;border-radius:6px;padding:24px\"><div style=\"font-weight:800;font-size:18px;margin-bottom:8px\">Сколько занимает замена батарейки?<\u002Fdiv><div style=\"font-size:17px;line-height:1.55;color:#5c5f68\">Обычно 10–15 минут, при вас. Ставим швейцарские Renata с гарантией 12 месяцев.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f7f7f5;border:1px solid #e3e3e0;border-radius:6px;padding:24px\"><div style=\"font-weight:800;font-size:18px;margin-bottom:8px\">Даёте ли гарантию?<\u002Fdiv><div style=\"font-size:17px;line-height:1.55;color:#5c5f68\">Да, всегда: 1 год на ремонт и работы, 12 месяцев на батарейки, 6–12 месяцев на обменянные часы.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f7f7f5;border:1px solid #e3e3e0;border-radius:6px;padding:24px\"><div style=\"font-weight:800;font-size:18px;margin-bottom:8px\">Что делать, если часы отстают?<\u002Fdiv><div style=\"font-size:17px;line-height:1.55;color:#5c5f68\">Скорее всего, села батарейка — её нельзя оставлять в часах, она может потечь. Приносите, проверим и заменим.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f7f7f5;border:1px solid #e3e3e0;border-radius:6px;padding:24px\"><div style=\"font-weight:800;font-size:18px;margin-bottom:8px\">Нужна ли запись?<\u002Fdiv><div style=\"font-size:17px;line-height:1.55;color:#5c5f68\">Нет, приходите в рабочие часы: среда, четверг и суббота с 11:00 до 17:00. Если сомневаетесь — позвоните.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== Контакты ===== -->\n<div id=\"contacts\" data-screen-label=\"Контакты\" style=\"background:#f2f2f0;border-top:1px solid #e3e3e0;scroll-margin-top:90px\">\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));align-items:stretch\">\n    <div style=\"padding:clamp(40px,6vw,56px) clamp(16px,4vw,48px)\">\n      <h2 style=\"font-size:clamp(28px,4vw,34px);font-weight:800;margin:0 0 24px\">Как нас найти<\u002Fh2>\n      <a href=\"tel:+79269593729\" style=\"font-size:clamp(26px,4vw,30px);font-weight:800;color:#e8402c;text-decoration:none\">8 (926) 959-37-29<\u002Fa>\n      <div style=\"font-size:18px;line-height:1.6;margin:16px 0 8px;font-weight:700\">г. Жуковский, ул. Гагарина, 3б<\u002Fdiv>\n      <div style=\"font-size:18px;line-height:1.6;color:#5c5f68;margin-bottom:24px\">Напротив полиции.<br>Вход на 2 этаж, окно справа.<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:auto 1fr;gap:8px 20px;font-size:18px;margin-bottom:28px\">\n        <span style=\"font-weight:700\">Ср, Чт, Сб<\u002Fspan><span style=\"color:#5c5f68\">11:00 – 17:00<\u002Fspan>\n        <span style=\"font-weight:700\">Пн, Вт, Пт, Вс<\u002Fspan><span style=\"color:#9a9da6\">выходной<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:12px\">\n        <a href=\"https://yandex.ru/maps/?mode=routes&amp;rtext=~%D0%96%D1%83%D0%BA%D0%BE%D0%B2%D1%81%D0%BA%D0%B8%D0%B9%2C%20%D1%83%D0%BB%D0%B8%D1%86%D0%B0%20%D0%93%D0%B0%D0%B3%D0%B0%D1%80%D0%B8%D0%BD%D0%B0%2C%203%D0%B1\" target=\"_blank\" rel=\"noopener\" style=\"padding:14px 26px;background:#e8402c;color:#fff;font-weight:800;font-size:17px;border-radius:4px;text-decoration:none\">Построить маршрут<\u002Fa>\n        <a href=\"tel:+79269593729\" style=\"padding:14px 26px;border:1px solid #c6c8cc;color:#33363f;font-weight:600;font-size:17px;border-radius:4px;background:#fff;text-decoration:none\">Позвонить<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"min-height:380px\">\n      <iframe title=\"Карта\" src=\"https://yandex.ru/map-widget/v1/?text=%D0%96%D1%83%D0%BA%D0%BE%D0%B2%D1%81%D0%BA%D0%B8%D0%B9%2C%20%D1%83%D0%BB%D0%B8%D1%86%D0%B0%20%D0%93%D0%B0%D0%B3%D0%B0%D1%80%D0%B8%D0%BD%D0%B0%2C%203%D0%B1&amp;z=17\" width=\"100%\" height=\"100%\" sc-camel-frame-border=\"0\" style=\"display:block;border:0;min-height:380px\"><\u002Fiframe>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== Футер ===== -->\n<div style=\"padding:22px clamp(16px,4vw,48px);background:#33363f;color:#c9cbd2;font-size:16px;display:flex;flex-wrap:wrap;gap:8px 24px;justify-content:space-between;align-items:center\">\n  <span>© 2014–2026 watch-fix.ru<\u002Fspan>\n  <a href=\"tel:+79269593729\" style=\"color:#fff;font-weight:700;text-decoration:none\">8 (926) 959-37-29<\u002Fa>\n<\u002Fdiv>\n\n<!-- ===== Плавающая кнопка звонка ===== -->\n<a href=\"tel:+79269593729\" aria-label=\"Позвонить\" style=\"position:fixed;right:20px;bottom:20px;width:60px;height:60px;border-radius:50%;background:#e8402c;box-shadow:0 6px 18px rgba(232,64,44,.45);display:grid;place-items:center;z-index:100;text-decoration:none\">\n  <svg width=\"26\" height=\"26\" sc-camel-view-box=\"0 0 24 24\"><path d=\"M6.5 3.5c.6 0 1.6 1.8 2 2.7.3.7-.4 1.4-1 2-.4.4 1 2.3 2.1 3.4 1.1 1.1 3 2.5 3.4 2.1.6-.6 1.3-1.3 2-1 .9.4 2.7 1.4 2.7 2 0 1.3-1.5 2.8-2.8 2.8-2.2 0-5-1.7-7.4-4.1S3.7 8 3.7 5.8c0-1.3 1.5-2.3 2.8-2.3z\" fill=\"#fff\"><\u002Fpath><\u002Fsvg>\n<\u002Fa>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    // обновляем статус раз в минуту\n    this._timer = setInterval(() => this.forceUpdate(), 60000);\n  }\n  componentWillUnmount() {\n    clearInterval(this._timer);\n  }\n  renderVals() {\n    const openDays = [3, 4, 6]; // Ср, Чт, Сб\n    const openH = 11, closeH = 17;\n    const dayNames = ['воскресенье', 'понедельник', 'вторник', 'среду', 'четверг', 'пятницу', 'субботу'];\n    const now = new Date();\n    const day = now.getDay();\n    const hour = now.getHours() + now.getMinutes() / 60;\n\n    let statusText, statusDot;\n    if (openDays.includes(day) && hour >= openH && hour < closeH) {\n      statusText = 'Сейчас открыто · до 17:00';\n      statusDot = '#7ee787';\n    } else {\n      // ближайший рабочий день\n      let d = day, add = 0;\n      if (openDays.includes(day) && hour < openH) {\n        add = 0;\n      } else {\n        do { add++; d = (day + add) % 7; } while (!openDays.includes(d));\n      }\n      let when;\n      if (add === 0) when = 'сегодня в 11:00';\n      else if (add === 1) when = 'завтра в 11:00';\n      else when = 'в ' + dayNames[(day + add) % 7] + ' в 11:00';\n      statusText = 'Закрыто · откроемся ' + when;\n      statusDot = '#ffd166';\n    }\n    return { statusText, statusDot };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
